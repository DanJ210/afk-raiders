name: Azure Preview Environments

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: azure-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    if: ${{ github.event.action != 'closed' && secrets.AZURE_STATIC_WEB_APPS_API_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Deploy preview to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          output_location: dist

  close-preview:
    name: Close PR Preview
    runs-on: ubuntu-latest
    if: ${{ github.event.action == 'closed' && secrets.AZURE_STATIC_WEB_APPS_API_TOKEN != '' }}
    steps:
      - name: Close preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close

  missing-token:
    name: Missing Azure token
    runs-on: ubuntu-latest
    if: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN == '' }}
    steps:
      - name: Explain missing secret
        run: |
          echo "AZURE_STATIC_WEB_APPS_API_TOKEN is not configured."
          echo "Set it in repository settings to enable preview environments."
