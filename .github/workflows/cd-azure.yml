name: CD - Azure Static Web Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate for Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 30

  deploy-production:
    name: Deploy to Azure Production
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: production
    env:
      AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    steps:
      - name: Require Azure deployment token
        run: |
          if [ -z "$AZURE_STATIC_WEB_APPS_API_TOKEN" ]; then
            echo "AZURE_STATIC_WEB_APPS_API_TOKEN is not configured."
            echo "Set it in repository settings to enable production deployment."
            exit 1
          fi

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Deploy to Azure Static Web Apps
        id: swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true

      - name: Smoke check deployment
        if: ${{ steps.swa.outputs.static_web_app_url != '' }}
        run: curl -fsSL --retry 3 --retry-delay 5 "${{ steps.swa.outputs.static_web_app_url }}"

      - name: Publish deployment summary
        run: |
          echo "## Azure deployment status" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.swa.outputs.static_web_app_url }}" ]; then
            echo "- URL: ${{ steps.swa.outputs.static_web_app_url }}" >> "$GITHUB_STEP_SUMMARY"
          fi
